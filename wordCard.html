<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词卡生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3685f2;
            --primary-hover: #2d6fd8;
            --bg-color: #f4f7fc;
            --bg-gradient: linear-gradient(180deg, #f8fbff 0%, #f3f7fc 100%);
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-color: #dbe3ef;
            --surface-border: #e5ebf5;
            --shadow-sm: 0 2px 10px rgba(13, 38, 76, 0.08);
            --shadow-md: 0 8px 24px rgba(13, 38, 76, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --focus-ring: 0 0 0 3px rgba(54, 133, 242, 0.22);
            --transition-fast: 0.18s ease;
            --transition-normal: 0.28s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
        }

        /* 输入区域 */
        .input-section {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(6px);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid var(--surface-border);
            z-index: 10;
        }

        .input-section h1 {
            font-size: 1.6rem;
            margin-bottom: 14px;
            color: var(--primary-color);
            text-align: center;
            letter-spacing: 0.02em;
            font-weight: 700;
        }

        .input-wrapper {
            max-width: 920px;
            margin: 0 auto;
        }

        .input-area {
            width: 100%;
            min-height: 110px;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            color: var(--text-color);
            background: #fff;
            resize: vertical;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .input-area::placeholder {
            color: #8a95a6;
        }

        .input-area:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: var(--focus-ring);
        }

        .input-hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .prefix-input {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            flex-shrink: 0;
        }

        .prefix-input label {
            font-size: 0.92rem;
            color: var(--text-muted);
            white-space: nowrap;
            font-weight: 500;
        }

        .prefix-input input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            width: 160px;
            color: var(--text-color);
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .prefix-input input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: var(--focus-ring);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin: 0;
            justify-content: flex-end;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .btn {
            padding: 10px 20px;
            font-size: 0.95rem;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background-color var(--transition-fast), border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            line-height: 1;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 2px 8px rgba(54, 133, 242, 0.24);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(54, 133, 242, 0.28);
        }

        .btn-secondary {
            background-color: #ffffff;
            color: #3f4a5e;
            border-color: var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #f5f8fe;
            border-color: #cdd8ea;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        #clearBtn {
            color: #6b7280;
        }

        .btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 卡片展示区域 */
        .cards-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .cards-container {
            flex: 1;
            display: none;
            flex-direction: column;
        }

        .cards-container.active {
            display: flex;
        }

        .cards-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: clamp(10px, 1.4vw, 16px);
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .word-card {
            position: relative;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            transition: transform var(--transition-normal), box-shadow var(--transition-normal), border-color var(--transition-normal);
            cursor: default;
            min-height: 0;
        }

        .word-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: #d2deef;
        }

        .word-card .word {
            font-size: clamp(1.2rem, 3.2vw, 2.1rem);
            font-weight: 650;
            color: var(--text-color);
            text-align: center;
            line-height: 1.32;
            letter-spacing: 0.01em;
            font-family: 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive;
            overflow-wrap: anywhere;
            hyphens: auto;
        }

        .card-number {
            position: absolute;
            top: 8px;
            left: 10px;
            font-size: 0.75rem;
            color: #718096;
            background: #eef3fb;
            border-radius: 999px;
            padding: 2px 8px;
            line-height: 1.2;
            font-weight: 600;
        }

        /* 分页控制 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 12px 14px;
            margin: 14px auto 0;
            flex-shrink: 0;
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.88);
            box-shadow: var(--shadow-sm);
            max-width: fit-content;
        }

        .pagination button {
            padding: 8px 16px;
            font-size: 0.92rem;
        }

        .page-info {
            font-size: 0.95rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .page-info span {
            font-weight: 700;
            color: var(--primary-color);
        }

        /* 导出状态 */
        .export-status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(21, 31, 49, 0.9);
            backdrop-filter: blur(6px);
            color: white;
            padding: 16px 28px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            z-index: 1000;
            display: none;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        /* 打印样式 */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            html, body {
                background: white !important;
                height: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .input-section {
                display: none !important;
            }

            .cards-section {
                padding: 0 !important;
                overflow: visible !important;
                height: auto !important;
                display: block !important;
            }

            .cards-container {
                display: grid !important;
                page-break-after: always;
                page-break-inside: avoid;
                width: 277mm;
                height: 190mm;
                padding: 0 !important;
                box-sizing: border-box;
                place-items: stretch;
            }

            .cards-container:last-child {
                page-break-after: auto;
            }

            .cards-grid {
                display: grid !important;
                width: 100%;
                height: 100%;
                gap: 5mm;
                max-width: none;
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(3, 1fr);
                padding: 12mm 12mm 0 12mm !important;
                margin: 0 !important;
                box-sizing: border-box !important;
            }

            .word-card {
                background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%) !important;
                box-shadow: var(--shadow-sm) !important;
                border: 1px solid var(--surface-border) !important;
                border-radius: var(--radius-lg) !important;
                transform: none !important;
                padding: 5mm !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                margin: 0 !important;
            }

            .word-card .word {
                color: #000000 !important;
                font-size: 46pt !important;
                font-weight: 700 !important;
                line-height: 1.2 !important;
                font-family: 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive !important;
            }

            .card-number {
                font-size: 11pt !important;
                color: #666 !important;
                top: 3mm !important;
                left: 4mm !important;
            }

            .pagination {
                display: none !important;
            }

            .empty-state {
                display: none !important;
            }

            .export-status {
                display: none !important;
            }

            @page {
                size: A4 landscape;
                margin: 10mm;
            }
        }

        /* 空状态 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border: 1px dashed var(--surface-border);
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.72);
            margin: 0 auto;
            width: min(100%, 1200px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .empty-state svg {
            width: 76px;
            height: 76px;
            margin-bottom: 16px;
            opacity: 0.42;
        }

        .empty-state p {
            font-size: 1.05rem;
            font-weight: 500;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(4, 1fr);
            }

            .controls-row {
                justify-content: flex-start;
                gap: 12px;
            }

            .btn-group {
                justify-content: flex-start;
            }
        }

        @media (max-width: 600px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(6, 1fr);
                gap: 10px;
            }

            .input-section {
                padding: 14px 12px;
            }

            .input-section h1 {
                font-size: 1.35rem;
                margin-bottom: 10px;
            }

            .prefix-input {
                width: 100%;
            }

            .prefix-input input {
                width: 100%;
                max-width: 220px;
            }

            .btn-group {
                width: 100%;
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 8px;
            }

            .btn {
                width: 100%;
                padding: 10px 8px;
                font-size: 0.9rem;
            }

            .pagination {
                width: 100%;
                max-width: 100%;
                justify-content: space-between;
                gap: 8px;
                padding: 10px;
            }

            .pagination button {
                padding: 8px 10px;
            }

            .page-info {
                font-size: 0.88rem;
            }

            .cards-section {
                padding: 12px 10px;
            }

            .empty-state {
                padding: 18px 12px;
            }

            .empty-state p {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- 输入区域 -->
    <section class="input-section">
        <h1>单词卡生成器</h1>
        <div class="input-wrapper">
            <textarea
                class="input-area"
                id="wordInput"
                placeholder="请输入单词，支持换行、空格、英文逗号、英文分号分隔&#10;例如：apple, banana, orange, grape&#10;或每行一个单词"
            ></textarea>
            <div class="controls-row">
                <div class="prefix-input">
                    <label for="prefixInput">序号前缀：</label>
                    <input type="text" id="prefixInput" placeholder="例如：24" maxlength="20" value="Lesson1">
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="generateBtn">生成单词卡</button>
                    <button class="btn btn-secondary" id="exportBtn" disabled>打印</button>
                    <button class="btn btn-secondary" id="clearBtn">清空</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 卡片展示区域 -->
    <section class="cards-section">
        <!-- 空状态 -->
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/>
                <path d="M12 8v8"/>
                <path d="M8 12h8"/>
            </svg>
            <p>输入单词后点击"生成单词卡"</p>
        </div>

        <!-- 卡片容器将通过JS动态生成 -->
    </section>

    <!-- 导出状态提示 -->
    <div class="export-status" id="exportStatus">正在生成PDF...</div>

    <script>
        // 配置
        const CARDS_PER_PAGE = 12;
        const CARDS_PER_ROW = 4;

        // 状态
        let allWords = [];
        let currentPage = 1;
        let totalPages = 0;

        // DOM元素
        const wordInput = document.getElementById('wordInput');
        const prefixInput = document.getElementById('prefixInput');
        const generateBtn = document.getElementById('generateBtn');
        const exportBtn = document.getElementById('exportBtn');
        const clearBtn = document.getElementById('clearBtn');
        const cardsSection = document.querySelector('.cards-section');
        const emptyState = document.getElementById('emptyState');
        const exportStatus = document.getElementById('exportStatus');

        // 解析输入的单词
        function parseWords(input) {
            // 使用正则表达式按换行、空格、逗号、分号分割
            const words = input
                .split(/[\n\s,;]+/)
                .map(word => word.trim())
                .filter(word => word.length > 0);

            // 去重
            return [...new Set(words)];
        }

        // 创建卡片页面
        function createCardsContainer(pageIndex, words, prefix) {
            const container = document.createElement('div');
            container.className = 'cards-container';
            container.dataset.page = pageIndex;

            const grid = document.createElement('div');
            grid.className = 'cards-grid';

            words.forEach((word, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';

                const cardIndex = (pageIndex - 1) * CARDS_PER_PAGE + index + 1;
                const number = document.createElement('span');
                number.className = 'card-number';
                number.textContent = prefix ? `${prefix}-${cardIndex}` : cardIndex;

                const wordSpan = document.createElement('span');
                wordSpan.className = 'word';
                wordSpan.textContent = word;

                card.appendChild(number);
                card.appendChild(wordSpan);
                grid.appendChild(card);
            });

            container.appendChild(grid);

            // 添加分页控制（只在最后一页添加可见的分页）
            if (totalPages > 1) {
                const pagination = document.createElement('div');
                pagination.className = 'pagination';

                pagination.innerHTML = `
                    <button class="btn btn-secondary" id="prevBtn" ${pageIndex === 1 ? 'disabled' : ''}>上一页</button>
                    <span class="page-info">第 <span id="currentPageNum">${pageIndex}</span> 页 / 共 <span id="totalPageNum">${totalPages}</span> 页</span>
                    <button class="btn btn-secondary" id="nextBtn" ${pageIndex === totalPages ? 'disabled' : ''}>下一页</button>
                `;

                container.appendChild(pagination);
            }

            return container;
        }

        // 生成单词卡
        function generateCards() {
            const input = wordInput.value.trim();
            if (!input) {
                alert('请输入单词！');
                return;
            }

            allWords = parseWords(input);

            if (allWords.length === 0) {
                alert('未识别到有效单词！');
                return;
            }

            // 获取序号前缀
            const prefix = prefixInput.value.trim();

            // 清空现有卡片
            const existingContainers = cardsSection.querySelectorAll('.cards-container');
            existingContainers.forEach(container => container.remove());

            // 计算总页数
            totalPages = Math.ceil(allWords.length / CARDS_PER_PAGE);
            currentPage = 1;

            // 为每页创建容器
            for (let i = 0; i < totalPages; i++) {
                const startIndex = i * CARDS_PER_PAGE;
                const endIndex = startIndex + CARDS_PER_PAGE;
                const pageWords = allWords.slice(startIndex, endIndex);

                const container = createCardsContainer(i + 1, pageWords, prefix);

                // 只有第一页默认显示
                if (i === 0) {
                    container.classList.add('active');
                }

                cardsSection.appendChild(container);
            }

            // 绑定分页事件
            bindPaginationEvents();

            // 隐藏空状态，显示卡片
            emptyState.style.display = 'none';

            // 启用导出按钮
            exportBtn.disabled = false;
        }

        // 绑定分页事件
        function bindPaginationEvents() {
            document.querySelectorAll('.pagination').forEach(pagination => {
                const prevBtn = pagination.querySelector('#prevBtn');
                const nextBtn = pagination.querySelector('#nextBtn');

                if (prevBtn) {
                    prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
                }
                if (nextBtn) {
                    nextBtn.addEventListener('click', () => goToPage(currentPage + 1));
                }
            });
        }

        // 切换页面
        function goToPage(page) {
            if (page < 1 || page > totalPages) return;

            currentPage = page;

            // 更新容器显示
            document.querySelectorAll('.cards-container').forEach(container => {
                const containerPage = parseInt(container.dataset.page);
                if (containerPage === page) {
                    container.classList.add('active');
                } else {
                    container.classList.remove('active');
                }
            });
        }

        // 清空
        function clearAll() {
            wordInput.value = '';
            allWords = [];
            currentPage = 1;
            totalPages = 0;

            const existingContainers = cardsSection.querySelectorAll('.cards-container');
            existingContainers.forEach(container => container.remove());

            emptyState.style.display = 'flex';
            exportBtn.disabled = true;
        }

        // 导出PDF
        async function exportPDF() {
            if (totalPages === 0) return;

            exportStatus.style.display = 'block';
            exportStatus.textContent = '正在准备打印...';

            // 临时存储当前页
            const originalPage = currentPage;

            // 显示所有页面用于打印
            document.querySelectorAll('.cards-container').forEach(container => {
                container.classList.add('active');
            });

            // 隐藏不需要打印的元素
            document.querySelectorAll('.pagination').forEach(p => {
                p.style.display = 'none';
            });

            exportStatus.textContent = '请在打印对话框中选择"另存为PDF"';

            setTimeout(() => {
                window.print();

                // 打印完成后恢复
                setTimeout(() => {
                    document.querySelectorAll('.cards-container').forEach(container => {
                        container.classList.remove('active');
                    });
                    document.querySelectorAll('.pagination').forEach(p => {
                        p.style.display = 'flex';
                    });
                    goToPage(originalPage);
                    exportStatus.style.display = 'none';
                }, 100);
            }, 300);
        }

        // 事件绑定
        generateBtn.addEventListener('click', generateCards);
        exportBtn.addEventListener('click', exportPDF);
        clearBtn.addEventListener('click', clearAll);

        // 快捷键支持
        wordInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                generateCards();
            }
        });

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (document.activeElement === wordInput) return;

            if (e.key === 'ArrowLeft' && currentPage > 1) {
                goToPage(currentPage - 1);
            } else if (e.key === 'ArrowRight' && currentPage < totalPages) {
                goToPage(currentPage + 1);
            }
        });

        // 阻止打印预览时的某些行为
        window.addEventListener('beforeprint', () => {
            document.querySelectorAll('.cards-container').forEach(container => {
                container.classList.add('active');
            });
            document.querySelectorAll('.pagination').forEach(p => {
                p.style.display = 'none';
            });
        });

        window.addEventListener('afterprint', () => {
            document.querySelectorAll('.cards-container').forEach(container => {
                container.classList.remove('active');
            });
            document.querySelectorAll('.pagination').forEach(p => {
                p.style.display = 'flex';
            });
            goToPage(currentPage);
        });
    </script>
</body>
</html>
